<!doctype html>
<html lang="en-ZA">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Leads | Fresh and Shine Cleaning Service</title>
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="/css/styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="nav-shell">
        <a class="brand" href="/"><img src="/assets/logo.jpeg" alt="Fresh and Shine Cleaning Service logo"></a>
        <div class="nav-actions"><a class="btn btn-line" href="/dashboard.html">Customer Dashboard</a></div>
      </div>
    </header>
    <main>
      <section class="page-hero"><div class="wrap"><span class="eyebrow">Admin</span><h1>Booking and quote inbox.</h1><p>Use the admin token to view local bookings, quote requests, contacts and notification records.</p></div></section>
      <section class="section">
        <div class="grid">
          <div class="admin-toolbar">
            <div class="field"><label>Admin token</label><input data-admin-token type="password" placeholder="fresh-admin"></div>
            <button class="btn btn-primary" type="button" data-admin-load>Load Records</button>
          </div>
          <div class="status-message" data-admin-message></div>
          <div class="dash-card table-wrap">
            <table>
              <thead><tr><th>Reference</th><th>Client</th><th>Service</th><th>Area / date</th><th>Status</th><th>Created</th></tr></thead>
              <tbody data-admin-body><tr><td colspan="6">Enter admin token to load records.</td></tr></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
    <script src="/js/main.js"></script>
    <script src="/js/admin.js"></script>
  </body>
</html>
